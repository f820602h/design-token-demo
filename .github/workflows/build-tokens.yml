name: Build Design Tokens

on:
  push:
    branches:
      - main
    paths:
      - 'tokens/**'          # 只有 tokens/ 有變動才觸發

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 允許 commit build 產出

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tokens
        run: pnpm build

      - name: Commit build output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: rebuild tokens [skip ci]'
          file_pattern: 'build/**'
